name: Feature Request
description: Suggest a new feature or dataset
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this benefit users of the index?
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New dataset
        - New field/schema change
        - Automation/workflow
        - Documentation
        - Other