name: Add Model
description: Request addition of a new AI model to the index
title: "[Model] "
labels: ["add-model", "data"]
body:
  - type: input
    id: model-name
    attributes:
      label: Model Name
      placeholder: e.g., GPT-5.4
    validations:
      required: true
  - type: input
    id: vendor
    attributes:
      label: Vendor
      placeholder: e.g., OpenAI
    validations:
      required: true
  - type: input
    id: parameters
    attributes:
      label: Parameter Count (billions)
      placeholder: e.g., 200
  - type: input
    id: release-date
    attributes:
      label: Release Date
      placeholder: "YYYY-MM-DD"
    validations:
      required: true
  - type: textarea
    id: benchmarks
    attributes:
      label: Benchmark Scores
      description: List known benchmark scores with sources
      placeholder: |
        MMLU: 92.1 (source: vendor blog)
        HumanEval: 88.0 (source: technical report)
  - type: input
    id: license
    attributes:
      label: License (SPDX)
      placeholder: e.g., Apache-2.0 or proprietary
  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Links to technical reports, blog posts, or papers
    validations:
      required: true