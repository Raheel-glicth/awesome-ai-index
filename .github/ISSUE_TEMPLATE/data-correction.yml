name: Data Correction
description: Report incorrect or outdated data
title: "[Fix] "
labels: ["data-correction", "bug"]
body:
  - type: input
    id: dataset
    attributes:
      label: Dataset
      description: Which file contains the error?
      placeholder: e.g., data/models/models.json
    validations:
      required: true
  - type: input
    id: entry-id
    attributes:
      label: Entry ID
      placeholder: e.g., openai-gpt-5.4
    validations:
      required: true
  - type: input
    id: field
    attributes:
      label: Field with Error
      placeholder: e.g., benchmarks.mmlu
    validations:
      required: true
  - type: input
    id: current-value
    attributes:
      label: Current (Incorrect) Value
    validations:
      required: true
  - type: input
    id: correct-value
    attributes:
      label: Correct Value
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source for Correction
      description: Link to authoritative source
    validations:
      required: true