name: Daily AI Index Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    name: Fetch and append daily AI index entries
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dateutil beautifulsoup4 lxml

      - name: Set current date
        id: date
        run: echo "today=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Fetch arXiv papers
        run: python scripts/fetch_arxiv.py

      - name: Fetch HuggingFace trending models
        run: python scripts/fetch_huggingface.py

      - name: Fetch LLM leaderboard data
        run: python scripts/fetch_llm_leaderboard.py

      - name: Generate ai-index.json artifact
        run: python scripts/generate_ai_index_json.py

      - name: Generate events.csv artifact
        run: python scripts/generate_events_csv.py

      - name: Commit and push directly to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily AI Index Update — ${{ steps.date.outputs.today }}"
            git push origin main
          fi
