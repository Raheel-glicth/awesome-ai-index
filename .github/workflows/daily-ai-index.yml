name: Daily AI Index Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    name: Fetch and append daily AI index entries
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dateutil beautifulsoup4 lxml

      - name: Set current date
        id: date
        run: echo "today=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Fetch arXiv papers
        run: python scripts/fetch_arxiv.py

      - name: Fetch HuggingFace trending models
        run: python scripts/fetch_huggingface.py

      - name: Fetch LLM leaderboard data
        run: python scripts/fetch_llm_leaderboard.py

      - name: Generate ai-index.json artifact
        run: python scripts/generate_ai_index_json.py

      - name: Generate events.csv artifact
        run: python scripts/generate_events_csv.py

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Daily AI Index Update — ${{ steps.date.outputs.today }}'
          title: 'Daily AI Index Update — ${{ steps.date.outputs.today }}'
          body: 'Automated daily update including arXiv papers, HuggingFace models, LLM leaderboard.'
          branch: daily-update
          delete-branch: true
          add-paths: |
            data/
            ai-index.json
            events.csv

      - name: Auto-merge PR via Git ref update
        if: steps.create-pr.outputs.pull-request-number
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.create-pr.outputs.pull-request-number }};
            // Get PR details to find the head SHA
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const headSha = pr.data.head.sha;
            // Force update main ref to point to the PR head commit
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main',
              sha: headSha,
              force: true
            });
            console.log(`Updated main to ${headSha}`);
            // Close the PR as merged
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed'
            });
            console.log('PR closed');
