name: Daily AI Index Update

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at 00:00 UTC
  workflow_dispatch:  # Allow manual triggers

permissions:
  contents: write
  pull-requests: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    name: Fetch and append daily AI index entries

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests python-dateutil

      - name: Fetch arXiv papers
        id: arxiv
        run: |
          python scripts/fetch_arxiv.py

      - name: Fetch HuggingFace trending models
        id: huggingface
        run: |
          python scripts/fetch_huggingface.py

      - name: Generate ai-index.json artifact
        run: |
          python scripts/generate_ai_index_json.py

      - name: Generate events.csv artifact
        run: |
          python scripts/generate_events_csv.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Daily AI Index Update - $(date -u +'%Y-%m-%d')"
          title: "Daily AI Index Update - $(date -u +'%Y-%m-%d')"
          body: "Automated daily update of AI index data including arXiv papers, HuggingFace trending models, ai-index.json, and events.csv."
          branch: daily-update
          delete-branch: true
          add-paths: |
            data/
            ai-index.json
            events.csv
