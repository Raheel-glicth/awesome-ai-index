name: Sync to Kaggle

on:
  push:
    branches: [main]
    paths: ['data/**']
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Kaggle CLI
        run: pip install git+https://github.com/Kaggle/kaggle-cli.git
      - name: Upload to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_KEY }}
        run: |
          kaggle datasets create -p data/ --dir-mode zip || kaggle datasets version -p data/ -m "Automated sync from GitHub" --dir-mode zip
